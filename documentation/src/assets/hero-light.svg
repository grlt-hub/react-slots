<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="316 66 568 468" width="568" height="468" preserveAspectRatio="xMidYMid meet" font-family="'JetBrains Mono', ui-monospace, monospace">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
    <style>
      /* JS-free animation: pure CSS @keyframes. Runs standalone, inside &lt;img&gt;, and inline. */
      .mod { opacity: 1; animation-duration: 8s; animation-iteration-count: infinite; animation-timing-function: cubic-bezier(.22,.7,.2,1); }
      .glow { opacity: 0; animation-duration: 8s; animation-iteration-count: infinite; animation-timing-function: ease-out; }

      .h1 { transform: translate(716px,116px); animation-name: fly-h1; }
      .h2 { transform: translate(808px,116px); animation-name: fly-h2; }
      .s1 { transform: translate(434px,219px); animation-name: fly-s1; }
      .s2 { transform: translate(434px,309px); animation-name: fly-s2; }
      .s3 { transform: translate(434px,399px); animation-name: fly-s3; }
      .f1 { transform: translate(675px,476px); animation-name: fly-f1; }
      .f2 { transform: translate(795px,476px); animation-name: fly-f2; }

      .g-h1 { animation-name: gl-h1; } .g-h2 { animation-name: gl-h2; }
      .g-s1 { animation-name: gl-s1; } .g-s2 { animation-name: gl-s2; } .g-s3 { animation-name: gl-s3; }
      .g-f1 { animation-name: gl-f1; } .g-f2 { animation-name: gl-f2; }

      @keyframes fly-h1 { 0%,6%  { opacity:0; transform:translate(718px,-244px); } 16%,82% { opacity:1; transform:translate(716px,116px); } 92%,100% { opacity:0; transform:translate(716px,116px); } }
      @keyframes fly-h2 { 0%,9%  { opacity:0; transform:translate(1330px,86px); }  19%,82% { opacity:1; transform:translate(808px,116px); } 92%,100% { opacity:0; transform:translate(808px,116px); } }
      /* s2 (order 20): docks at the top, then reflows down to the middle when 10 inserts above. */
      @keyframes fly-s2 { 0%,16% { opacity:0; transform:translate(14px,39px); } 26%,50% { opacity:1; transform:translate(434px,219px); } 60%,82% { opacity:1; transform:translate(434px,309px); } 92%,100% { opacity:0; transform:translate(434px,309px); } }
      /* s3 (order 30): docks in the middle, then reflows to the bottom on the same insert. */
      @keyframes fly-s3 { 0%,20% { opacity:0; transform:translate(-26px,579px); } 30%,50% { opacity:1; transform:translate(434px,309px); } 60%,82% { opacity:1; transform:translate(434px,399px); } 92%,100% { opacity:0; transform:translate(434px,399px); } }
      /* s1 (order 10): inserts late from the left, jumps to the top and pushes 20 and 30 down. */
      @keyframes fly-s1 { 0%,52% { opacity:0; transform:translate(160px,219px); } 64%,82% { opacity:1; transform:translate(434px,219px); } 92%,100% { opacity:0; transform:translate(434px,219px); } }
      @keyframes fly-f1 { 0%,28% { opacity:0; transform:translate(675px,836px); }  38%,82% { opacity:1; transform:translate(675px,476px); } 92%,100% { opacity:0; transform:translate(675px,476px); } }
      @keyframes fly-f2 { 0%,31% { opacity:0; transform:translate(1215px,836px); } 41%,82% { opacity:1; transform:translate(795px,476px); } 92%,100% { opacity:0; transform:translate(795px,476px); } }

      @keyframes gl-h1 { 0%,12% { opacity:0; } 16% { opacity:.7; } 24% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-h2 { 0%,15% { opacity:0; } 19% { opacity:.7; } 27% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-s1 { 0%,58% { opacity:0; } 64% { opacity:.7; } 72% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-s2 { 0%,22% { opacity:0; } 28% { opacity:.7; } 36% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-s3 { 0%,26% { opacity:0; } 32% { opacity:.7; } 40% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-f1 { 0%,34% { opacity:0; } 38% { opacity:.7; } 46% { opacity:0; } 100% { opacity:0; } }
      @keyframes gl-f2 { 0%,37% { opacity:0; } 41% { opacity:.7; } 49% { opacity:0; } 100% { opacity:0; } }

      @media (prefers-reduced-motion: reduce) {
        .mod, .glow { animation: none; }
        .glow { opacity: 0; }
      }
    </style>
  </defs>
